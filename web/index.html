<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Photo Culler</title>
    <link rel="stylesheet" href="/styles.css?v=viewer-layout-status" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Photo Culler</h1>
        <p id="libraryPath"></p>
      </div>
      <div class="actions">
        <button id="chooseFolderBtn">Choose Folder</button>
        <button id="scanBtn">Scan</button>
        <button id="scanControlBtn" hidden>Stop</button>
        <button id="moveOrphanBtn">Move Orphan RAWs</button>
        <button id="moveBtn" class="danger">Move Rejects</button>
      </div>
    </header>

    <nav class="filters">
      <button data-status="" class="active">All</button>
      <button data-status="unmarked">Unmarked</button>
      <button data-status="keep">Keep</button>
      <button data-status="review">Review</button>
      <button data-status="reject">Reject</button>
      <button data-warning="soft">Soft</button>
      <button data-warning="no_raw_pair">No RAW</button>
      <button data-view="orphan_raws">Orphan RAW</button>
      <input id="search" placeholder="Search filename" />
    </nav>

    <main>
      <section class="summary" id="summary"></section>
      <section class="grid" id="grid"></section>
      <button id="loadMore" class="load-more">Load more</button>
    </main>

    <dialog id="viewer">
      <form method="dialog">
        <button class="close">Close</button>
      </form>
      <div class="imageStage" id="imageStage">
        <img id="viewerImg" alt="" />
      </div>
      <div class="viewerInfo">
        <div class="viewerTitle">
          <strong id="viewerName"></strong>
          <span id="viewerPosition" class="viewerPosition"></span>
          <span id="viewerMeta" class="viewerToolStatus"></span>
        </div>
        <div class="viewerDetails">
          <div class="viewerBadges">
            <span id="viewerSource" class="sourceBadge"></span>
            <span id="viewerBrandBadges" class="brandBadges"></span>
          </div>
          <span id="viewerExposure" class="exposureInfo"></span>
        </div>
        <div class="viewerActions">
          <button id="zoomOut" type="button">-</button>
          <button id="zoomFit" type="button">Fit</button>
          <button id="zoomIn" type="button">+</button>
          <button data-mark="keep">Keep</button>
          <button data-mark="review">Review</button>
          <button data-mark="reject" class="danger">Reject</button>
        </div>
      </div>
    </dialog>

    <dialog id="folderDialog" class="folderDialog">
      <form method="dialog">
        <button class="close">Close</button>
      </form>
      <div class="folderPicker">
        <div class="folderHeader">
          <strong>Choose Folder</strong>
          <div id="folderPath" class="folderPath"></div>
        </div>
        <div id="folderShortcuts" class="folderShortcuts"></div>
        <div class="folderToolbar">
          <button id="folderUpBtn" type="button">Up</button>
          <button id="useFolderBtn" type="button">Use This Folder</button>
        </div>
        <div id="folderList" class="folderList"></div>
      </div>
    </dialog>

    <script src="/app.js?v=viewer-layout-status"></script>
  </body>
</html>
